<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Dictionary</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <main>
        <header>
            <h1>English Dictionary</h1>
            <p>Learn best definitions synonyms and pronunciation</p>
        </header>

        <section>
            <div id="searchForm">
                <label for="searchInput">Search word</label>
                <input id="searchInput"
                       type="text"
                       placeholder="Enter a word"
                       aria-label="Enter a word to search" />
                <button type="submit">Search</button>
           </div>
        </section>

        <section class="results">
            <h2>Results</h2>
            <div>
                <h3 id="word">Word example</h3>
                <p id="phonetics">Phonetics: </p>
                <p id="definitions">Definition: </p>
                <p id="synonyms">Synonyms: </p>
                <p id="example">Example: </p>

                <button id="audiobtn">Play audio</button>
            </div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
